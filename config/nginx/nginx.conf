worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;
    server_tokens off;
    client_max_body_size 1m;

    map $http_authorization $rate_identity {
        "" $binary_remote_addr;
        default $http_authorization;
    }

    map $request_method $read_key {
        GET $rate_identity;
        HEAD $rate_identity;
        default "";
    }

    map $request_method $mutation_key {
        GET "";
        HEAD "";
        OPTIONS "";
        default $rate_identity;
    }

    limit_req_zone $read_key zone=erp_reads:10m rate=120r/m;
    limit_req_zone $mutation_key zone=erp_mutations:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=erp_tokens:1m rate=10r/m;
    limit_req_status 429;

    log_format safe_access '$time_iso8601 request_id=$request_id method=$request_method '
                           'uri=$uri status=$status bytes=$body_bytes_sent '
                           'duration=$request_time upstream=$upstream_status';
    access_log /dev/stdout safe_access;
    error_log /dev/stderr warn;

    upstream private_ords {
        server oracle-adb:8443;
        keepalive 16;
    }

    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/tls/edge.crt;
        ssl_certificate_key /etc/nginx/tls/edge.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_tickets off;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        location = /healthz {
            access_log off;
            return 200 '{"status":"UP","component":"erp-edge"}';
        }

        location = /ords/erp/oauth/token {
            limit_req zone=erp_tokens burst=5 nodelay;
            proxy_pass https://private_ords;
            proxy_http_version 1.1;
            proxy_set_header Host oracle-adb;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_ssl_server_name on;
            proxy_ssl_name localhost;
            proxy_ssl_trusted_certificate /etc/nginx/tls/ords-ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 3;
        }

        location ^~ /ords/erp/supplier-onboarding/v1/ {
            limit_req zone=erp_reads burst=20 nodelay;
            limit_req zone=erp_mutations burst=10 nodelay;
            proxy_pass https://private_ords;
            proxy_http_version 1.1;
            proxy_set_header Host oracle-adb;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $request_id;
            proxy_ssl_server_name on;
            proxy_ssl_name localhost;
            proxy_ssl_trusted_certificate /etc/nginx/tls/ords-ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 3;
        }

        location / {
            return 404 '{"error":{"code":"NOT_FOUND","message":"Route not available"}}';
        }
    }

    server {
        listen 8444 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/tls/edge.crt;
        ssl_certificate_key /etc/nginx/tls/edge.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        location = /healthz {
            access_log off;
            return 200 '{"status":"UP","component":"database-actions-edge"}';
        }

        location ^~ /ords/ {
            proxy_pass https://private_ords;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port 8444;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $request_id;
            proxy_ssl_server_name on;
            proxy_ssl_name localhost;
            proxy_ssl_trusted_certificate /etc/nginx/tls/ords-ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 3;
        }

        location / {
            return 404 '{"error":{"code":"NOT_FOUND","message":"Route not available"}}';
        }
    }
}
