name: erp-supplier-onboarding

services:
  oracle-adb:
    image: ghcr.io/oracle/adb-free:26.2.4.2-26ai
    container_name: erp-oracle-adb
    hostname: oracle-adb
    env_file:
      - .local/secrets/adb.env
    environment:
      WORKLOAD_TYPE: ATP
      DATABASE_NAME: ERPATP
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    ports:
      - "127.0.0.1:1521:1522"
      - "127.0.0.1:1522:1522"
    expose:
      - "8443"
    volumes:
      - oracle_adb_data:/u01/data
    networks:
      - oracle_bootstrap_egress
      - erp_backend
    restart: unless-stopped
    shm_size: 2gb
    mem_limit: 8g
    cpus: 4.0
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/1522'"]
      interval: 20s
      timeout: 5s
      retries: 90
      start_period: 10m

  erp-edge:
    image: nginx:1.28.0-alpine
    container_name: erp-local-edge
    depends_on:
      oracle-adb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.local/trust/edge.crt:/etc/nginx/tls/edge.crt:ro
      - ./.local/trust/local-ca.crt:/etc/nginx/tls/local-ca.crt:ro
      - ./.local/secrets/edge.key:/etc/nginx/tls/edge.key:ro
      - ./.local/trust/ords-ca.crt:/etc/nginx/tls/ords-ca.crt:ro
    networks:
      - edge_ingress
      - erp_backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail --cacert /etc/nginx/tls/local-ca.crt https://localhost:8443/healthz | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  edge_ingress:
    name: erp_edge_ingress
  oracle_bootstrap_egress:
    name: erp_oracle_bootstrap_egress
  erp_backend:
    name: erp_backend
    internal: true

volumes:
  oracle_adb_data:
    name: erp_oracle_adb_data
